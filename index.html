function fmt(n){return Math.round(n).toLocaleString()}
function setFilter(bed){
  ['1','2','3'].forEach(b=>map.removeLayer(layers[b]));
  (bed==='all'?['1','2','3']:[bed]).forEach(b=>layers[b].addTo(map));
  const vis=['1','2','3'].map(b=>bed==='all'||b===bed);
  [yChart,pChart].forEach(ch=>ch.data.datasets.forEach((ds,i)=>{ds.hidden=!vis[i];},ch.update()));
  document.querySelectorAll('.bed-btn').forEach(btn=>btn.classList.remove('active'));
  document.querySelector(`.bed-btn[data-bed="${bed}"]`).classList.add('active');
  document.getElementById('map-label').textContent='Rental Yield Map — '+{'all':'all bedrooms','1':'1 bedroom','2':'2 bedrooms','3':'3 bedrooms'}[bed];
  const pts=bed==='all'?allPoints:allPoints.filter(p=>p.beds===bed);
  if(pts.length){const sy=pts.map(p=>p.yield_pct).sort((a,b)=>a-b),sp=pts.map(p=>p.sale_price).sort((a,b)=>a-b),sr=pts.map(p=>p.rent_pw).sort((a,b)=>a-b),m=Math.floor(pts.length/2);
  document.getElementById('m-count').textContent=pts.length.toLocaleString();
  document.getElementById('m-yield').textContent=(pts.length%2?sy[m]:(sy[m-1]+sy[m])/2).toFixed(2)+'%';
  document.getElementById('m-price').textContent='$'+fmt(pts.length%2?sp[m]:(sp[m-1]+sp[m])/2);
  document.getElementById('m-rent').textContent='$'+fmt(pts.length%2?sr[m]:(sr[m-1]+sr[m])/2);}
