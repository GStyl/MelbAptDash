<head>

<title>Inner Melbourne Apartments</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#fff;font-family:'Space Grotesk',sans-serif}
.header{padding:20px 24px 18px;border-bottom:1px solid #222}
.header h1{font-size:1.5rem;font-weight:600;letter-spacing:-0.02em}
.metrics{display:flex;gap:12px;padding:16px 24px;border-bottom:1px solid #222;flex-wrap:wrap}
.metric{background:#0d2137;border:1px solid #1a3d5c;border-radius:8px;padding:12px 18px;flex:1;min-width:120px}
.metric .label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.05em}
.metric .value{font-size:1.3rem;font-weight:600;margin-top:2px}
.filter-row{padding:12px 24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid #222;flex-wrap:wrap}
.filter-group{display:flex;gap:6px;align-items:center}
.filter-label{font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-right:2px}
.tog-btn{padding:6px 15px;border-radius:20px;border:1px solid #444;background:transparent;color:#aaa;font-size:.82rem;cursor:pointer;transition:all .15s}
.tog-btn.active{color:#0f1117;font-weight:600;border-color:transparent}
.tog-btn[data-bed="all"].active{background:#fff}
.tog-btn[data-bed="1"].active{background:#00c8ff}
.tog-btn[data-bed="2"].active{background:#00e676}
.tog-btn[data-bed="3"].active{background:#ffaa00}
.tog-btn[data-period].active{background:#8b5cf6;color:#fff}

/* Map + list side-by-side */
.map-list-wrap{display:flex;margin:16px 24px;border-radius:10px;overflow:hidden;height:540px;gap:0}
.map-side{flex:0 0 60%;position:relative}
#map{height:100%;width:100%}
.list-side{flex:0 0 40%;background:#13131f;display:flex;flex-direction:column;border-left:1px solid #222}
.list-header{padding:11px 14px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.list-header-left{font-size:.82rem;color:#aaa}
.list-header-left strong{color:#fff}
.sort-select{background:#0f1117;color:#ccc;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:.78rem;font-family:inherit;cursor:pointer;outline:none}
.sort-select:hover{border-color:#555}
.prop-list{overflow-y:auto;flex:1}
.prop-list::-webkit-scrollbar{width:4px}
.prop-list::-webkit-scrollbar-track{background:transparent}
.prop-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.prop-item{padding:11px 14px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .12s}
.prop-item:hover{background:#1a2535}
.prop-item.active{background:#1a2535;border-left:3px solid #8b5cf6}
.prop-addr{font-size:.82rem;font-weight:600;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-suburb{font-size:.75rem;color:#888;margin-top:1px}
.prop-specs{font-size:.74rem;color:#777;margin-top:4px}
.prop-stats{display:flex;align-items:baseline;gap:10px;margin-top:5px}
.prop-yield{font-size:1rem;font-weight:700}
.prop-price{font-size:.78rem;color:#ccc}
.prop-rent{font-size:.78rem;color:#aaa}
.prop-dates{font-size:.72rem;color:#555;margin-top:3px}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 24px 24px}
.chart-box{background:#13131f;border-radius:10px;padding:16px}
.chart-box h3{font-size:.9rem;color:#ccc;margin-bottom:12px}
.chart-box canvas{max-height:280px}
.divider{border:none;border-top:1px solid #222;margin:0 24px 16px}
.leaflet-popup-content-wrapper{background:#1e2030;color:#f0f0f0;border:1px solid #444;border-radius:8px}
.leaflet-popup-tip{background:#1e2030}
.leaflet-popup-content{font-size:13px;line-height:1.7;padding:4px 2px}
.yield-legend{background:rgba(255,255,255,0.93);padding:10px 12px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.2);font-size:11px;line-height:1.4;color:#222}
.yield-legend b{display:block;margin-bottom:6px;font-size:11px}
</style>
</head>

<div class="header">
  <h1>Inner Melbourne Apartments</h1>
</div>
<div class="metrics">

<div class="filter-row">

  <div class="filter-group">

    <button class="tog-btn active" data-period="2y" onclick="setPeriod('2y')">2 years</button>
  </div>
</div>

<div class="map-list-wrap">
  <!-- Map -->
  <div class="map-side"><div id="map"></div></div>

  <!-- Property list -->
  <div class="list-side">
    <div class="list-header">

      <select class="sort-select" id="sort-select" onchange="rebuildList()">

        <option value="price-desc">Highest price</option>
        <option value="price-asc">Lowest price</option>
        <option value="date-desc">Most recent sale</option>
      </select>
    </div>
    <div class="prop-list" id="prop-list"></div>
  </div>
</div>

<div class="divider"></div>
<div class="charts">

</div>

// ---- Color scale ----
function yieldColor(y) {
  const stops = [
    [3,  [59,  76, 192]],
    [5,  [103, 136, 238]],
    [6,  [247, 229,  75]],
    [8,  [244, 129,  58]],
    [10, [180,   4,  38]],
  ];
  const v = Math.max(3, Math.min(10, y));
  for (let i = 1; i < stops.length; i++) {
    if (v <= stops[i][0]) {
      const t = (v - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
      const [a, b] = [stops[i-1][1], stops[i][1]];
      return `rgb(${Math.round(a[0]+t*(b[0]-a[0]))}, ${Math.round(a[1]+t*(b[1]-a[1]))}, ${Math.round(a[2]+t*(b[2]-a[2]))})`;
    }
  }
  return 'rgb(180,4,38)';
}

  div.innerHTML =
    '<b>Yield</b>' +
    '<div style="display:flex;gap:7px;align-items:stretch;margin-top:2px">' +
      `<div style="width:13px;border-radius:4px;background:${gradient}"></div>` +
      '<div style="display:flex;flex-direction:column;justify-content:space-between;height:90px;padding:1px 0">' +
        ['10%','8%','6%','5%','3%'].map(l=>`<span>${l}</span>`).join('') +
      '</div></div>';
  return div;
};
legend.addTo(map);

// ---- Marker icon ----
function makeIcon(color, yieldPct) {
  return L.divIcon({
    className: '',
    html: `<div style="width:36px;height:36px;border-radius:50%;background:${color};border:1.5px solid rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:#111;text-shadow:0 0 2px rgba(255,255,255,0.5)">${yieldPct.toFixed(1)}%</div>`,
    iconSize:[36,36], iconAnchor:[18,18], popupAnchor:[0,-20],
  });
}

function fmtPrice(v) { return v>=1e6 ? '$'+(v/1e6).toFixed(2)+'M' : '$'+Math.round(v/1e3)+'k'; }
function fmtSpec(val, label) { return val && val!=='0' ? val+' '+label : ''; }

function makePopup(p, color) {
  const specs = [fmtSpec(p.beds,'bed'), fmtSpec(p.baths,'bath'), fmtSpec(p.parking,'park')].filter(Boolean).join(' · ');
  return `<b>${p.address}, ${p.suburb}</b><br>` +
    `${specs}<br>` +
    `Yield: <b style="color:${color}">${p.yield_pct.toFixed(2)}%</b><br>` +
    `Sale: <b>${fmtPrice(p.sale_price)}</b> &nbsp;<span style="color:#aaa">${p.date}</span><br>` +
    `Rent: <b>$${p.rent_pw}/wk</b> &nbsp;<span style="color:#aaa">${p.rent_date}</span>`;
}

const markerLayer = L.layerGroup().addTo(map);

// ---- Rebuild map markers ----
function rebuildMap() {
  markerLayer.clearLayers();
  markers = [];
  activeIdx = -1;

  const now    = new Date();
  const cutoff = new Date(now.getTime() - PERIOD_DAYS[activePeriod] * 86400000);

  currentPts = ALL_POINTS.filter(p => {
    if (activeBed !== 'all' && p.beds !== activeBed) return false;
    if (new Date(p.date) < cutoff) return false;
    return true;
  });

  currentPts.forEach((p, i) => {
    const color = yieldColor(p.yield_pct);
    const m = L.marker([p.lat, p.lon], {icon: makeIcon(color, p.yield_pct)})
      .bindPopup(makePopup(p, color))
      .addTo(markerLayer);
    m.on('click', () => highlightItem(i));
    markers.push(m);
  });

  updateMetrics(currentPts);
  rebuildList();
}

// ---- Rebuild property list ----
function rebuildList() {
  const sort = document.getElementById('sort-select').value;
  const pts  = [...currentPts];

  if (sort === 'yield-desc') pts.sort((a,b) => b.yield_pct - a.yield_pct);
  else if (sort === 'yield-asc')  pts.sort((a,b) => a.yield_pct - b.yield_pct);
  else if (sort === 'price-desc') pts.sort((a,b) => b.sale_price - a.sale_price);
  else if (sort === 'price-asc')  pts.sort((a,b) => a.sale_price - b.sale_price);
  else if (sort === 'date-desc')  pts.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('list-count').textContent = pts.length;

  const el = document.getElementById('prop-list');
  if (!pts.length) { el.innerHTML = '<div style="padding:24px 14px;color:#555;font-size:.82rem">No properties match the current filters.</div>'; return; }

  el.innerHTML = pts.map((p, listIdx) => {
    const color = yieldColor(p.yield_pct);
    const origIdx = currentPts.indexOf(p);
    const specs = [fmtSpec(p.beds,'bed'), fmtSpec(p.baths,'bath'), fmtSpec(p.parking,'park')].filter(Boolean).join(' · ');
    const bedCol = BED_COLOR[p.beds] || '#aaa';
    return `<div class="prop-item" id="item-${origIdx}" onclick="focusMarker(${origIdx})">
      <div class="prop-addr">${p.address}</div>
      <div class="prop-suburb">${p.suburb}</div>
      <div class="prop-specs" style="color:#666">${specs}</div>
      <div class="prop-stats">
        <span class="prop-yield" style="color:${color}">${p.yield_pct.toFixed(2)}%</span>
        <span class="prop-price">${fmtPrice(p.sale_price)}</span>
        <span class="prop-rent">$${p.rent_pw}/wk</span>
      </div>
      <div class="prop-dates">Sale: ${p.date} &nbsp;&middot;&nbsp; Rent: ${p.rent_date}</div>
    </div>`;
  }).join('');
}

// ---- Focus a marker from the list ----
function focusMarker(origIdx) {
  if (activeIdx >= 0) {
    const el = document.getElementById('item-'+activeIdx);
    if (el) el.classList.remove('active');
  }
  activeIdx = origIdx;
  const el = document.getElementById('item-'+origIdx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  const m = markers[origIdx];
  if (m) { map.setView(m.getLatLng(), Math.max(map.getZoom(), 15), {animate:true}); m.openPopup(); }
}

function highlightItem(origIdx) {
  if (activeIdx >= 0) {
    const el = document.getElementById('item-'+activeIdx);
    if (el) el.classList.remove('active');
  }
  activeIdx = origIdx;
  const el = document.getElementById('item-'+origIdx);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
}

// ---- Metrics ----
function updateMetrics(pts) {
  const n = pts.length;
  document.getElementById('m-count').textContent = n;
  if (!n) { ['m-yield','m-price','m-rent'].forEach(id => document.getElementById(id).textContent='—'); return; }
  const med = arr => { const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };
  document.getElementById('m-yield').textContent = med(pts.map(p=>p.yield_pct)).toFixed(2)+'%';
  const mp = med(pts.map(p=>p.sale_price));
  document.getElementById('m-price').textContent = fmtPrice(mp);
  document.getElementById('m-rent').textContent  = '$'+med(pts.map(p=>p.rent_pw))+'/wk';
}

// ---- Charts ----
const chartBase = {
  responsive:true, maintainAspectRatio:true,
  plugins:{ legend:{ labels:{ color:'#ccc', boxWidth:12, padding:12 } } },
  scales:{
    x:{ type:'time', time:{unit:'year'}, ticks:{color:'#888',maxTicksLimit:8}, grid:{color:'#222'} },
    y:{ ticks:{color:'#888'}, grid:{color:'#222'} },
  }
};

const yieldCh = new Chart(document.getElementById('yieldChart'), {
  type:'line',
  data:{ datasets: YIELD_ORIG.map(d=>Object.assign({},d)) },
  options:{ ...chartBase, scales:{ ...chartBase.scales,
    y:{ ...chartBase.scales.y, ticks:{ ...chartBase.scales.y.ticks, callback: v=>v.toFixed(1)+'%' } }
  } }
});

const priceCh = new Chart(document.getElementById('priceChart'), {
  type:'line',
  data:{ datasets: PRICE_ORIG.map(d=>Object.assign({},d)) },
  options:{ ...chartBase, scales:{ ...chartBase.scales,
    y:{ ...chartBase.scales.y, ticks:{ ...chartBase.scales.y.ticks,
      callback: v => v>=1e6 ? '$'+(v/1e6).toFixed(1)+'M' : '$'+Math.round(v/1e3)+'k'
    } }
  } }
});

function updateCharts(bed) {
  const label = bed+' bed';
  yieldCh.data.datasets = (bed==='all' ? YIELD_ORIG : YIELD_ORIG.filter(d=>d.label===label)).map(d=>Object.assign({},d));
  priceCh.data.datasets = (bed==='all' ? PRICE_ORIG : PRICE_ORIG.filter(d=>d.label===label)).map(d=>Object.assign({},d));
  yieldCh.update();
  priceCh.update();
}

// ---- Filter handlers ----
function setBed(bed) {
  activeBed = bed;
  document.querySelectorAll('.tog-btn[data-bed]').forEach(b => b.classList.toggle('active', b.dataset.bed===bed));
  rebuildMap();
  updateCharts(bed);
}

function setPeriod(period) {
  activePeriod = period;
  document.querySelectorAll('.tog-btn[data-period]').forEach(b => b.classList.toggle('active', b.dataset.period===period));
  rebuildMap();
}

// Initial render
rebuildMap();
</script>
</body>
</html>
